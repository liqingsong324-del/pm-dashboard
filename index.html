<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>项目管理系统 - SIBU</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 💡 局部样式隔离：纯前端动态筛选选框精细样式方案 */
        .filter-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto; /* 让筛选器靠左，按钮组靠右，形成自然的视觉拉伸对齐 */
        }
        .filter-select {
            padding: 0 12px;
            height: 36px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            background-color: #ffffff;
            color: #495057;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            max-width: 180px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        .filter-select:focus {
            border-color: #4d90fe;
            box-shadow: 0 0 0 2px rgba(77, 144, 254, 0.2);
        }
    </style>
</head>
<body>
<div class="glass-container">
    <div class="hero">
        <h1>📊 项目管理系统</h1>
        <p>测试版本</p>
    </div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-title">功能菜单</div>
            <div class="module-buttons" id="moduleButtons">
                </div>
        </aside>

        <main class="main-content">
            <div class="toolbar-card">
                <div class="file-zone">
                    <label>📂 导入 Excel</label>
                    <input type="file" id="excelUpload" accept=".xlsx, .xls, .csv" class="file-input">
                </div>
            </div>

            <div id="columnMappingPanel" class="toolbar-card" style="display: none; flex-direction: column; align-items: stretch;">
                <div class="mapping-grid">
                    <div class="mapping-item">
                        <label>🏷️ 项目名称列</label>
                        <select id="projectColSelect"></select>
                    </div>
                    <div class="mapping-item">
                        <label>🎨 项目类型列（可选）</label>
                        <select id="typeColSelect">
                            <option value="">— 不使用类型列 —</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 16px;">
                    <label style="font-weight: 700; display: block; margin-bottom: 12px;">📌 节点映射（每个节点产生一张卡片）</label>
                    <div id="nodesContainer">
                        </div>
                    <button type="button" id="addNodeBtn" class="btn btn-secondary" style="margin-top: 12px;">+ 添加节点</button>
                </div>

                <div class="btn-group" style="margin-top: 16px; justify-content: flex-end;">
                    <button id="generateCalendarBtn" class="btn btn-primary">✨ 生成日历</button>
                </div>
            </div>

            <div class="fullscreen-wrapper" id="fullscreenWrapper">
                <div class="fullscreen-ctrl-bar" id="fullscreenCtrlBar" style="display: none; gap: 10px; align-items: center; justify-content: flex-end; width: 100%;">
                    
                    <div id="dynamicFilterContainer" class="filter-container"></div>
                    
                    <button id="toggleFullscreenBtn" class="btn-fullscreen">
                        <span class="fs-icon">🎦</span> <span class="fs-text">全屏展示</span>
                    </button>
                    <button id="exportImageBtn" class="btn-fullscreen" style="background: linear-gradient(135deg, #4c9a8e 0%, #367c71 100%);">
                        <span>📸</span> <span>导出日历截图</span>
                    </button>
                </div>

                <div id="moduleContainer" class="calendar-wrap">
                    <div style="text-align:center; padding:60px; color:#8aa0b5;">👈 上传 Excel 文件，配置节点后生成日历</div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        ✅ 模块化架构 | 支持日历 · 甘特图 · 风险提醒
    </footer>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script src="calendar.js"></script>
<script src="app.js"></script>
</body>
</html>
